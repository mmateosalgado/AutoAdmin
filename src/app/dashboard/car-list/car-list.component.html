<section class="car-list">
  @if ((cars$ | async)?.length === 0) {
    <app-empty-state></app-empty-state>
  } @else {
    @for (car of (cars$ | async); track car.patent) {
      <div class="card-wrap">
        <app-car-card
          [car]="car"
          (editCar)="EditCar($event)"
          (editStatusCar)="EditStatusCar($event)"
          (close)="close.emit()">
        </app-car-card>
      </div>
    }
  }
</section>
