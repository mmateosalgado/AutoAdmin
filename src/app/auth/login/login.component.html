<div class="page-login">
  <div class="login-card" role="main" aria-labelledby="loginTitle">
    <div class="logo-circle" aria-hidden="true">
      <!-- simple car icon -->
      <svg xmlns="http://www.w3.org/2000/svg" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="#155DFC"
        stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-car-icon lucide-car">
        <path
          d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2" />
        <circle cx="7" cy="17" r="2" />
        <path d="M9 17h6" />
        <circle cx="17" cy="17" r="2" />
      </svg>
    </div>

    <h1 id="loginTitle" class="title">Auto Admin</h1>
    <p class="subtitle">Ingresa tus credenciales para acceder al panel de administración</p>
    <form class="login-form" (ngSubmit)="onSubmit()" #loginForm="ngForm" novalidate>
      <div class="field">
        <label for="username">Usuario</label>
        <input id="username" name="username" type="text" [(ngModel)]="username" required />
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" name="password" type="password" [(ngModel)]="password" required />
      </div>

      <button class="btn-primary" type="submit" aria-label="Iniciar sesión">
        <!-- lock icon -->
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" style="margin-right:8px"
          xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M17 11V9C17 6.23858 14.7614 4 12 4C9.23858 4 7 6.23858 7 9V11" stroke="white" stroke-width="1.4"
            stroke-linecap="round" stroke-linejoin="round" />
          <rect x="5" y="11" width="14" height="8" rx="2" stroke="white" stroke-width="1.4" />
        </svg>
        Iniciar Sesión
      </button>
    </form>

    @if (errorMessage) {
    <p class="error">{{ errorMessage }}</p>
    }

    <p class="hint">Usuario: <strong>admin</strong> | Contraseña: <strong>1234</strong></p>
  </div>
</div>
