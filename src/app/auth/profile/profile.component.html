<app-header [showAddCar]="false"></app-header>

<div class="perfil-container">
    <div class="perfil-header">
        <div>
            <h1>Perfil de Usuario</h1>
            <p>Administra tu cuenta y credenciales de plataformas</p>
        </div>
    </div>

    <div class="perfil-content">
        <!-- Cambiar Contraseña -->
        <div class="card">
            <h2>Cambiar Contraseña</h2>
            <p>Actualiza la contraseña de tu cuenta de administrador</p>

            <label>Contraseña Actual</label>
            <input type="password" placeholder="•••••••">

            <label>Nueva Contraseña</label>
            <input type="password" placeholder="•••••••">

            <label>Confirmar Nueva Contraseña</label>
            <input type="password" placeholder="•••••••">

            <button class="primary-btn">Actualizar Contraseña</button>
        </div>

        <!-- Credenciales de Plataformas -->
        <!-- Credenciales de Plataformas -->
        <!-- Credenciales de Plataformas -->
        <div class="card">
            <h2>Credenciales de Plataformas</h2>
            <p>Guarda tus credenciales de Instagram, Mercado Libre y Facebook</p>

            <!-- Instagram -->
            <div class="platform" [class.active]="openAccordion === 'instagram'">
                <div class="accordion-header" (click)="toggleAccordion('instagram')">

                            fill="#0F0F0F" />
                        <path
                            d="M18 5C17.4477 5 17 5.44772 17 6C17 6.55228 17.4477 7 18 7C18.5523 7 19 6.55228 19 6C19 5.44772 18.5523 5 18 5Z"

                    </svg>
                    <span>Instagram</span>
                    <span class="arrow">&#9662;</span>
                </div>
                <div class="accordion-body">
                    <div class="input-group">
                        <label>Usuario</label>
                        <input type="text" placeholder="tu_usuario_instagram">
                    </div>
                    <div class="input-group">
                        <label>Contraseña</label>
                        <input type="password" placeholder="•••••••">
                    </div>
                </div>
            </div>

            <!-- Facebook -->
            <div class="platform" [class.active]="openAccordion === 'facebook'">
                <div class="accordion-header" (click)="toggleAccordion('facebook')">
                    <!-- SVG Facebook -->
                    <svg xmlns="http://www.w3.org/2000/svg" fill="#000000" width="30px" height="30px"

                    <span>Facebook</span>
                    <span class="arrow">&#9662;</span>
                </div>
                <div class="accordion-body">
                    <div class="input-group">
                        <label>Usuario</label>
                        <input type="text" placeholder="tu_usuario_facebook">
                    </div>
                    <div class="input-group">
                        <label>Contraseña</label>
                        <input type="password" placeholder="•••••••">
                    </div>
                </div>
            </div>

            <!-- Mercado Libre -->
            <div class="platform" [class.active]="openAccordion === 'mercado'">

                    <span>Mercado Libre</span>
                    <span class="arrow">&#9662;</span>
                </div>
                <div class="accordion-body">
                    <div class="input-group">
                        <label>Usuario</label>
                        <input type="text" placeholder="tu_usuario_mercadolibre">
                    </div>
                    <div class="input-group">
                        <label>Contraseña</label>
                        <input type="password" placeholder="•••••••">
                    </div>
                </div>
            </div>

            <button class="primary-btn">Guardar Credenciales</button>
        </div>
    </div>
</div>

<div class="logout-container">
    <button class="logout-btn" (click)="logout()">
        <!-- ícono logout -->
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true">
            <path d="M15 3H21V21H15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                stroke-linejoin="round" />
            <path d="M10 17L15 12L10 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                stroke-linejoin="round" />
            <path d="M3 12H15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                stroke-linejoin="round" />
        </svg>
        <span>Cerrar Sesión</span>
    </button>
</div>

<script>
    const accordions = document.querySelectorAll('.accordion');

    accordions.forEach(acc => {
        const header = acc.querySelector('.accordion-header');
        header.addEventListener('click', () => {
            acc.classList.toggle('active');
        });
    });
</script>
