<header class="app-header">
  <div class="header-left">
    <div class="icon-car-circle" aria-hidden="true">
      <a href="home" class="car-icon" aria-label="Inicio">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#155DFC"
          stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round">
          <path
            d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2" />
          <circle cx="7" cy="17" r="2" />
          <path d="M9 17h6" />
          <circle cx="17" cy="17" r="2" />
        </svg>
      </a>
    </div>


    <div class="brand">
      <div class="title">Auto Admin</div>
      <div class="subtitle">Panel de Administración de Autos</div>
    </div>
  </div>

  @if (showAddCar) {
  <div class="header-right">
    <button (click)="onAddCar()" class="btn-add" aria-label="Agregar Auto">+ Agregar Auto</button>
  </div>
  }


  

  <div class="profile-link">
    <a href="profile">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-circle-user-round-icon lucide-circle-user-round"><path d="M18 20a6 6 0 0 0-12 0"/><circle cx="12" cy="10" r="4"/><circle cx="12" cy="12" r="10"/></svg>
    </a>
  </div>
</header>
