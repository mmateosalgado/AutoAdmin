<!-- edit-car-modal.component.html -->
<div class="modal" [class.closing]="isClosing" role="dialog" aria-modal="true" aria-labelledby="editCarTitle">
  <div class="modal-content">
    <button (click)="onClose()" class="modal-close" aria-label="Cerrar modal">&times;</button>

    <h2 id="editCarTitle">Editar Auto</h2>
    <p class="modal-sub">Modifica los datos del auto</p>

    <form class="car-form" novalidate onsubmit="return false;">
      <!-- fila 1: marca / modelo -->
      <div class="row">
        <div class="field">
          <label for="marca">Marca</label>
          <input id="marca" type="text" value={{car?.make}} />
        </div>
        <div class="field">
          <label for="modelo">Modelo</label>
          <input id="modelo" type="text" value={{car?.model}} />
        </div>
        <div class="spacer"></div>
      </div>

      <!-- fila 2: año / precio / kilometraje -->
      <div class="row">
        <div class="field">
          <label for="anio">Año</label>
          <input id="anio" type="number" value={{car?.year}} />
        </div>
        <div class="field">
          <label for="precio">Precio ($)</label>
          <input id="precio" type="number" value={{car?.price}} />
        </div>
        <div class="field">
          <label for="km">Kilometraje</label>
          <input id="km" type="number" value={{car?.kilometers}} />
        </div>
      </div>

      <!-- fila 3: combustible / transmision / color -->
      <div class="row">
        <div class="field">
          <label for="combustible">Combustible</label>
          <select id="combustible">
            <option [selected]="car?.fuel === 'Gasoline'">Gasoline</option>
            <option [selected]="car?.fuel === 'Diesel'">Diesel</option>
            <option [selected]="car?.fuel === 'GNC'">GNC</option>
          </select>
        </div>
        <div class="field">
          <label for="transmision">Transmisión</label>
          <select id="transmision">
            <option [selected]="car?.transmission === 'Manual'">Manual</option>
            <option [selected]="car?.transmission === 'Automática'">Automática</option>
          </select>
        </div>
        <div class="field">
          <label for="color">Color</label>
          <input id="color" type="text" value={{car?.color}} />
        </div>
      </div>

      <!-- descripcion -->
      <div class="field">
        <label for="descripcion">Descripción</label>
        <textarea id="descripcion" rows="3">{{car?.description}}</textarea>
      </div>

      <!-- imagenes -->
      <div class="field images-upload">
        <label>Imágenes</label>

        <!-- imágenes existentes -->
        <div class="existing-images">
          @if (car?.image) {
          <div class="image-wrapper">
            <img [src]="car?.image" alt="Auto" />
            <button type="button" class="btn-delete">✖</button>
          </div>
          }
        </div>


        <!-- subir nuevas imágenes -->
        <div class="upload-drop" aria-hidden="true">
          <button type="button" class="btn-upload">📤 Subir Imágenes</button>
          <input type="file" #fileInput multiple hidden />
          <div class="upload-hint">Selecciona múltiples imágenes del auto</div>
        </div>
      </div>

      <!-- acciones -->
      <div class="actions">
        <button type="submit" class="btn-save">Actualizar Auto</button>
        <button (click)="onClose()" type="button" class="btn-cancel">Cancelar</button>
      </div>
    </form>
  </div>
</div>
