<div class="add-sidebar" [class.closing]="isClosing">
  <div class="add-content">
    <button (click)="onClose()" class="sidebar-close" aria-label="Cerrar Agregar Auto">&times;</button>

    <form [formGroup]="carForm" class="car-form" novalidate (ngSubmit)="addCar()">
      <div class="row">
        <div class="field">
          <label for="make">Marca</label>
          <input id="make" type="text" formControlName="make" placeholder="Toyota, Ford, etc." />
        </div>
        <div class="field">
          <label for="model">Modelo</label>
          <input id="model" type="text" formControlName="model" placeholder="Corolla, Focus, etc." />
        </div>
        <div class="field">
          <label for="fuel">Combustible</label>
          <select id="fuel" formControlName="fuel">
            <option value="">Selecciona tipo</option>
            <option value="Gasolina">Gasolina</option>
            <option value="Gas">Gas</option>
            <option value="Diesel">Diésel</option>
            <option value="Hibrido">Híbrido</option>
            <option value="Eléctrico">Eléctrico</option>
          </select>
        </div>
        <div class="field">
          <label for="transmission">Transmisión</label>
          <select id="transmission" formControlName="transmission">
            <option value="">Selecciona tipo</option>
            <option value="Manual">Manual</option>
            <option value="Automatica">Automática</option>
          </select>
        </div>
        <div class="field">
          <label for="year">Año</label>
          <input id="year" type="number" formControlName="year" />
        </div>
      </div>

      <div class="row">
        <div class="field">
          <label for="price">Precio ($)</label>
          <input id="price" type="number" formControlName="price" />
        </div>
        <div class="field">
          <label for="kilometers">Kilometraje</label>
          <input id="kilometers" type="number" formControlName="kilometers" />
        </div>
        <div class="field">
          <label for="color">Color</label>
          <input id="color" type="text" formControlName="color" />
        </div>
        <div class="field">
          <label for="patent">Patente</label>
          <input id="patent" type="text" formControlName="patent" />
          @if(!addCarResp){
            <div class="error-msg">⚠️ Esa patente ya existe</div>
          }
        </div>
      </div>

      <div class="field">
        <label for="description">Descripción</label>
        <textarea id="description" formControlName="description"></textarea>
      </div>

      <div class="field images-upload">
        <label>Imágenes</label>
        <div class="upload-drop">
          <button type="button" class="btn-upload">📤 Subir Imágenes</button>
          <div class="upload-hint">Selecciona múltiples imágenes del auto</div>
        </div>
      </div>

      <div class="actions">
        <button type="submit" [disabled]="!carForm.valid" class="btn-save">
          Guardar Auto
        </button>
        <button type="button" (click)="onClose()" class="btn-cancel">Cancelar</button>
      </div>
    </form>
  </div>
</div>
